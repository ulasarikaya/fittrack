*{box-sizing:border-box;margin:0;padding:0}
body{background:#080B10;color:#E8ECF0;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top)}
#root{max-width:480px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#00BFFF44;border-radius:2px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,select,button{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
button{cursor:pointer}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.glow{text-shadow:0 0 12px #00BFFF88}
.tab-line{position:absolute;top:0;left:15%;right:15%;height:2px;background:#00BFFF;border-radius:0 0 2px 2px}
.sr-input{background:#1A1F28;border:1px solid #2A3040;color:#E8ECF0;border-radius:4px;padding:6px 4px;text-align:center;font-size:15px;font-weight:700;width:100%;outline:none}
.sr-input:focus{border-color:#00BFFF}
.sr-done .sr-input{background:#0A2010;border-color:#39FF1440;color:#39FF14}
.fi{background:#1A1F28;border:1px solid #2A3040;color:#E8ECF0;border-radius:6px;padding:9px 11px;font-size:14px;font-weight:600;outline:none;width:100%}
.fi:focus{border-color:#00BFFF}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0D1117;border:1px solid #1E2530;border-radius:14px 14px 0 0;padding:14px;z-index:300;max-height:78vh;overflow-y:auto}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1A2530;border:1px solid #00BFFF40;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;color:#00BFFF;z-index:999;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

async function loadData(){
  try{
    const base = _db.collection("users").doc(currentUser);
    const [wSnap,nSnap,cfSnap,ceSnap] = await Promise.all([
      base.collection("workouts").orderBy("date","desc").get(),
      base.collection("nutrition_logs").get(),
      base.collection("custom_foods").get(),
      base.collection("custom_exercises").get()
    ]);
    STATE.workoutHistory = wSnap.docs.map(d=>({__id:d.id,...d.data(),sets:d.data().sets||[]}));
    const log={};
    nSnap.docs.forEach(d=>{ log[d.id]=d.data().meals||{}; });
    STATE.nutritionLog = log;
    STATE.customFoods = cfSnap.docs.map(d=>({__id:d.id,...d.data()}));
    STATE.customExercises = ceSnap.docs.map(d=>({__id:d.id,...d.data()}));
    STATE.loading = false;
    const savedAW = loadAW();
    if(savedAW){
      STATE.activeWorkout=savedAW; STATE.workoutRunning=true;
      STATE.elapsed=elapsedFromTS(); STATE.tab="workout";
      startTimer();
    }
    render();
  }catch(e){
    console.error("loadData error:",e);
    STATE.loading=false; render();
  }
}

async function saveWorkoutDB(entry){
  try{
    const ref = await _db.collection("users").doc(currentUser).collection("workouts").add({day:entry.day,date:entry.date,duration:entry.duration,sets:entry.sets});
    STATE.workoutHistory=[{__id:ref.id,...entry},...STATE.workoutHistory];
    render(); showToast("✓ Antrenman kaydedildi!");
  }catch(e){ console.error("save error:",e); showToast("⚠️ Kaydetme hatası!"); }
}

async function saveNutritionDB(date,meals){
  STATE.nutritionLog={...STATE.nutritionLog,[date]:meals}; render();
  try{ await _db.collection("users").doc(currentUser).collection("nutrition_logs").doc(date).set({date,meals}); }
  catch(e){ console.error("nutrition error:",e); }
}

async function saveCustomFoodDB(food){
  try{
    const ref = await _db.collection("users").doc(currentUser).collection("custom_foods").add(food);
    const newFood = {__id:ref.id,...food};
    STATE.customFoods = [...STATE.customFoods, newFood];
    showToast("✓ Besin kaydedildi!");
    return newFood;
  }catch(e){ console.error("custom food error:",e); showToast("⚠️ Kaydetme hatası!"); return null; }
}

async function deleteWorkout(id){
  if(!confirm("Bu antrenmanı silmek istediğine emin misin?")) return;
  STATE.workoutHistory = STATE.workoutHistory.filter(w=>w.__id!==id);
  render();
  try{
    await _db.collection("users").doc(currentUser).collection("workouts").doc(id).delete();
    showToast("✓ Antrenman silindi");
  }catch(e){
    console.error("delete error:",e);
    showToast("⚠️ Silme hatası!");
  }
}

// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function todayStr(){
  return new Date().toLocaleDateString("tr-TR",{timeZone:"Europe/Istanbul",year:"numeric",month:"2-digit",day:"2-digit"}).split(".").reverse().join("-");
}
function fmtDate(s){ return new Date(s+"T12:00:00").toLocaleDateString("tr-TR",{month:"short",day:"numeric"}); }
function fmtDur(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function calcN(id,g){
  let f = FOOD_DB.find(x=>x.id===id);
  if(!f){
    const cf = STATE.customFoods.find(x=>x.__id===id);
    if(cf) f = {p:{kcal:cf.kcal,protein:cf.protein,carb:cf.carb,fat:cf.fat}};
  }
  if(!f) return{kcal:0,protein:0,carb:0,fat:0};
  const r=g/100;
  return{kcal:Math.round(f.p.kcal*r),protein:Math.round(f.p.protein*r*10)/10,carb:Math.round(f.p.carb*r*10)/10,fat:Math.round(f.p.fat*r*10)/10};
}
function getPRs(history){
  const prs={};
  history.forEach(s=>(s.sets||[]).forEach(set=>{
    const v=set.weight*set.reps;
    if(!prs[set.exId]||v>prs[set.exId].vol) prs[set.exId]={weight:set.weight,reps:set.reps,vol:v,date:s.date};
  }));
  return prs;
}
function getWeekKey(dateStr){
  // Returns "YYYY-WW" using Monday-based ISO weeks
  const d = new Date(dateStr + "T12:00:00");
  const tmp = new Date(d);
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 4 - (tmp.getDay()||7)); // Thursday of the week
  const yearStart = new Date(tmp.getFullYear(), 0, 1);
  const weekNo = Math.ceil(((tmp - yearStart) / 86400000 + 1) / 7);
  return tmp.getFullYear() + "-" + String(weekNo).padStart(2,"0");
}

function getStreak(history){
  if(!history.length) return {current:0, best:0};

  // Get all unique weeks that have at least 1 workout
  const weekSet = new Set(history.map(h => getWeekKey(h.date)));
  const weeks = [...weekSet].sort(); // ascending

  // Best streak: max consecutive weeks
  let best = 1, cur = 1;
  for(let i = 1; i < weeks.length; i++){
    const [y1,w1] = weeks[i-1].split("-").map(Number);
    const [y2,w2] = weeks[i].split("-").map(Number);
    // Check if consecutive (handle year boundary)
    const totalWeeks1 = y1 * 53 + w1;
    const totalWeeks2 = y2 * 53 + w2;
    if(totalWeeks2 - totalWeeks1 === 1){ cur++; best = Math.max(best, cur); }
    else cur = 1;
  }

  // Current streak: count consecutive weeks backwards from today
  const todayWk = getWeekKey(new Date().toISOString().split("T")[0]);
  const lastWk  = getWeekKey(new Date(Date.now() - 7*86400000).toISOString().split("T")[0]);

  // Start from current week if it has workout, else from last week
  let startWk = weekSet.has(todayWk) ? todayWk : (weekSet.has(lastWk) ? lastWk : null);
  if(!startWk) return {current:0, best};

  let streak = 0;
  let [cy, cw] = startWk.split("-").map(Number);
  while(true){
    const wk = cy + "-" + String(cw).padStart(2,"0");
    if(weekSet.has(wk)){ streak++; }
    else break;
    // Go back one week
    cw--;
    if(cw < 1){ cy--; cw = 52; } // approximate, good enough
  }

  return {current: streak, best: Math.max(streak, best)};
}

function getTrend(history,exId){
  const pts=[];
  history.forEach(s=>{
    const best=(s.sets||[]).filter(x=>x.exId===exId).reduce((a,b)=>(!a||b.weight>a.weight)?b:a,null);
    if(best) pts.push({date:s.date,weight:best.weight});
  });
  return pts;
}
function getWeekVol(history){
  const now=new Date(),ws=new Date(now); ws.setDate(now.getDate()-6);
  const vol={};
  history.filter(h=>new Date(h.date)>=ws).forEach(s=>{
    (s.sets||[]).forEach(set=>{
      const ex=ALL_EX.find(e=>e.id===set.exId);
      if(ex) vol[ex.muscle]=(vol[ex.muscle]||0)+set.weight*set.reps;
    });
  });
  return vol;
}
function pill(text,color){ return`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:${color}18;color:${color};border:1px solid ${color}30;display:inline-flex;align-items:center;gap:3px">${text}</span>`; }
function donutSVG(eaten,target){
  const pct=Math.min(eaten/(target||1),1),r=44,circ=2*Math.PI*r,dash=pct*circ;
  return`<svg viewBox="0 0 100 100" width="90" height="90"><circle cx="50" cy="50" r="${r}" fill="none" stroke="#1A2530" stroke-width="10"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="#00BFFF" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 50 50)"/><text x="50" y="46" text-anchor="middle" fill="#E8ECF0" font-size="13" font-weight="bold" font-family="Barlow Condensed,sans-serif">${eaten}</text><text x="50" y="58" text-anchor="middle" fill="#7A8898" font-size="8" font-family="Barlow Condensed,sans-serif">/ ${target}</text></svg>`;
}
function sparklineSVG(data,color,w,h){
  if(!data||data.length<2) return`<span style="color:#555;font-size:11px">Yetersiz veri</span>`;
  const ws=data.map(d=>d.weight),mn=Math.min(...ws),mx=Math.max(...ws),rng=mx-mn||1;
  const pts=data.map((d,i)=>{const x=(i/(data.length-1))*w,y=h-((d.weight-mn)/rng)*(h-6)-3;return x+","+y;}).join(" ");
  const lx=w,ly=h-((data[data.length-1].weight-mn)/rng)*(h-6)-3;
  return`<svg width="${w}" height="${h}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lx}" cy="${ly}" r="3" fill="${color}"/></svg>`;
}
function showToast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

function filterHistoryByRange(history, range){
  const now = new Date();
  const days = {week:7, month:30, "3month":90, "6month":180, year:365, all:99999};
  const d = days[range] || 7;
  return history.filter(h => (now - new Date(h.date)) / 86400000 <= d);
}

function getVolByRange(history, range){
  const filtered = filterHistoryByRange(history, range);
  const vol = {};
  filtered.forEach(s => {
    (s.sets||[]).forEach(set => {
      const ex = ALL_EX.find(e=>e.id===set.exId);
      if(ex) vol[ex.muscle] = (vol[ex.muscle]||0) + set.weight*set.reps;
    });
  });
  return vol;
}

function getTrendByRange(history, exId, range){
  const filtered = filterHistoryByRange(history, range);
  const pts = [];
  filtered.forEach(s => {
    const best = (s.sets||[]).filter(x=>x.exId===exId).reduce((a,b)=>(!a||b.weight>a.weight)?b:a,null);
    if(best) pts.push({date:s.date, weight:best.weight});
  });
  return pts;
}

// LEADERBOARD
// ═══════════════════════════════════════════════════════════════════════════════
let LEADERBOARD_DATA = {}; // {username: {workoutHistory, displayName}}
let LEADERBOARD_LOADING = false;

async function loadLeaderboardData(){
  LEADERBOARD_LOADING = true;
  try{
    const usernames = Object.keys(USERS);
    const results = await Promise.all(usernames.map(async u=>{
      const wSnap = await _db.collection("users").doc(u).collection("workouts").orderBy("date","desc").get();
      return {
        username: u,
        displayName: USERS[u].displayName || u,
        workoutHistory: wSnap.docs.map(d=>({__id:d.id,...d.data(),sets:d.data().sets||[]}))
      };
    }));
    LEADERBOARD_DATA = {};
    results.forEach(r=>{ LEADERBOARD_DATA[r.username]=r; });
  }catch(e){ console.error("leaderboard error:",e); }
  LEADERBOARD_LOADING = false;
  render();
}

function renderLeaderboard(){
  // Auto-load on first visit
  if(Object.keys(LEADERBOARD_DATA).length===0 && !LEADERBOARD_LOADING){
    loadLeaderboardData();
    return`<div style="padding:32px;text-align:center;color:#556070"><div style="font-size:36px" class="pulse">🏆</div><div style="font-size:16px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase;margin-top:12px">Yükleniyor...</div></div>`;
  }
  if(LEADERBOARD_LOADING) return`<div style="padding:32px;text-align:center;color:#556070"><div style="font-size:36px" class="pulse">🏆</div><div style="font-size:16px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase;margin-top:12px">Yükleniyor...</div></div>`;

  const users = Object.values(LEADERBOARD_DATA);
  if(!users.length) return`<div style="padding:32px;text-align:center;color:#556070">Veri yok</div>`;

  // Compute stats per user
  const stats = users.map(u=>{
    const h = u.workoutHistory;
    const prs = getPRs(h);
    const streakObj = getStreak(h);
    // This week
    const _now=new Date(),_day=_now.getDay()||7;
    const _mon=new Date(_now); _mon.setHours(0,0,0,0); _mon.setDate(_now.getDate()-(_day-1));
    const thisWeekCount = h.filter(w=>new Date(w.date+"T00:00:00")>=_mon).length;
    // Total volume all time
    const totalVol = h.reduce((acc,s)=>{
      return acc+(s.sets||[]).reduce((a,set)=>a+set.weight*set.reps,0);
    },0);
    // Top PRs by volume
    const topPRs = Object.entries(prs)
      .map(([exId,pr])=>({exId,...pr,name:ALL_EX.find(e=>e.id===exId)?.name||exId}))
      .sort((a,b)=>b.vol-a.vol).slice(0,5);
    return {
      username: u.username,
      displayName: u.displayName,
      totalWorkouts: h.length,
      thisWeek: thisWeekCount,
      streak: streakObj.current,
      bestStreak: streakObj.best,
      totalVol: Math.round(totalVol),
      topPRs,
      isSelf: u.username === currentUser,
    };
  });

  const MEDAL = ["🥇","🥈","🥉","4️⃣","5️⃣"];

  // Section renderer helper
  const section = (title, icon, rows) => `
    <div style="background:#0D1117;border:1px solid #1E2530;border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">${icon} ${title}</div>
      ${rows}
    </div>`;

  const row = (medal,name,val,unit,isSelf) => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1A2530">
      <span style="font-size:18px;width:28px;text-align:center">${medal}</span>
      <span style="flex:1;font-size:14px;font-weight:${isSelf?900:600};color:${isSelf?"#00BFFF":"#E8ECF0"};text-transform:uppercase">${name}${isSelf?" (sen)":""}</span>
      <span style="font-size:14px;font-weight:900;color:${isSelf?"#00BFFF":"#E8ECF0"}">${val}<span style="font-size:10px;color:#7A8898;font-weight:400"> ${unit}</span></span>
    </div>`;

  // 1. Bu hafta antrenman
  const byWeek = [...stats].sort((a,b)=>b.thisWeek-a.thisWeek);
  const weekRows = byWeek.map((u,i)=>row(MEDAL[i]||"",""+u.displayName,u.thisWeek,"seans",u.isSelf)).join("");

  // 2. Seri rekoru
  const byStreak = [...stats].sort((a,b)=>b.bestStreak-a.bestStreak);
  const streakRows = byStreak.map((u,i)=>row(MEDAL[i]||"",u.displayName,u.bestStreak,"hafta",u.isSelf)).join("");

  // 3. Toplam hacim
  const byVol = [...stats].sort((a,b)=>b.totalVol-a.totalVol);
  const volRows = byVol.map((u,i)=>row(MEDAL[i]||"",u.displayName,u.totalVol.toLocaleString(),"kg·tekr",u.isSelf)).join("");

  // 4. PR karşılaştırması (TOP 5 hareket - en yüksek PR'a göre sıralı)
  // Collect all exercise IDs that appear in any user's PRs
  const allExIds = [...new Set(stats.flatMap(u=>u.topPRs.map(p=>p.exId)))];
  const prRows = allExIds.slice(0,5).map(exId=>{
    const ex = ALL_EX.find(e=>e.id===exId);
    const name = ex?.name || exId;
    const mc = MC[ex?.muscle]||"#00BFFF";
    const userPRs = stats.map(u=>{
      const prs = getPRs(u.workoutHistory);
      return {displayName:u.displayName, pr:prs[exId]||null, isSelf:u.isSelf};
    }).filter(x=>x.pr).sort((a,b)=>b.pr.vol-a.pr.vol);
    if(!userPRs.length) return "";
    return `<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="font-size:10px;font-weight:700;color:${mc};background:${mc}20;padding:2px 8px;border-radius:3px;text-transform:uppercase">${ex?.muscle||""}</span>
        <span style="font-size:13px;font-weight:800;text-transform:uppercase">${name}</span>
      </div>
      ${userPRs.map((u,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1A2530">
        <span style="font-size:14px;width:24px;text-align:center">${MEDAL[i]||""}</span>
        <span style="flex:1;font-size:13px;font-weight:${u.isSelf?800:500};color:${u.isSelf?"#00BFFF":"#E8ECF0"};text-transform:uppercase">${u.displayName}${u.isSelf?" ✦":""}</span>
        <span style="font-size:13px;font-weight:900;color:${u.isSelf?"#00BFFF":"#E8ECF0"}">${u.pr.weight}kg <span style="color:#556070;font-weight:400">×${u.pr.reps}</span></span>
      </div>`).join("")}
    </div>`;
  }).join("");

  return`<div style="padding:16px;padding-bottom:100px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h1 style="font-size:26px;font-weight:900;letter-spacing:1px;text-transform:uppercase"><span style="color:#FFD700">Liderlik</span> Tablosu</h1>
    <button onclick="loadLeaderboardData()" style="background:#1A1F28;border:1px solid #2A3040;border-radius:8px;color:#7A8898;font-size:11px;font-weight:700;padding:6px 12px;text-transform:uppercase">🔄 Güncelle</button>
  </div>
  ${section("Bu Hafta Antrenmanlar","📅",weekRows)}
  ${section("Seri Rekoru","🔥",streakRows)}
  ${section("Toplam Hacim","⚡",volRows)}
  <div style="background:#0D1117;border:1px solid #1E2530;border-radius:12px;padding:14px;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">💪 PR Karşılaştırması (Top 5)</div>
    ${prRows||'<div style="color:#556070;text-align:center;padding:16px;font-size:13px">Henüz PR kaydı yok</div>'}
  </div>
  </div>`;
}

function setTab(t){ STATE.tab=t; render(); }

  authed=false; currentUser=null;
  localStorage.removeItem(AUTH_KEY); localStorage.removeItem(USER_KEY);
  STATE={tab:"dashboard",workoutHistory:[],nutritionLog:{},customFoods:[],customExercises:[],activeWorkout:null,workoutRunning:false,elapsed:0,loading:true,timerRef:null,autoSaveRef:null,drawer:null,progressRange:"week"};
  stopTimer(); saveAW(null); saveTS(null);
  render();
}
function setProgressRange(r){ STATE.progressRange=r; render(); }
function toggleSec(id){
  const b=document.getElementById(id+"-body"),a=document.getElementById(id+"-arr");
  if(!b) return; const open=b.style.display==="none";
  b.style.display=open?"block":"none"; if(a) a.textContent=open?"▲":"▼";
}

function startCustomWorkout(){
  STATE.drawer = {type:"customWorkoutName", name:""};
  render();
}

function confirmCustomWorkoutName(){
  const d = STATE.drawer;
  const name = d?.name?.trim() || "Özel Antrenman";
  STATE.drawer = null;
  const aw = {dayName: name, exercises:[], startDate: todayStr(), isCustom: true};
  STATE.activeWorkout = aw;
  STATE.workoutRunning = true;
  STATE.tab = "workout";
  saveTS(Date.now()); saveAW(aw); startTimer(); render();
}

function startWorkout(dayName){
  const plan=WORKOUT_PLAN[dayName];
  const last=[...STATE.workoutHistory].reverse().find(h=>h.day===dayName);
  const exercises=plan.exercises.map(ex=>{
    const ls=last?(last.sets||[]).filter(s=>s.exId===ex.id):[];
    // Önceki setin ağırlığını al; index yoksa son setin ağırlığını fallback olarak kullan
    const lastW = ls.length>0 ? ls[ls.length-1].weight : null;
    const lastR = ls.length>0 ? ls[ls.length-1].reps   : null;
    return{...ex,sets:Array.from({length:ex.ds},(_,i)=>({
      setNum:i+1,
      weight: String(ls[i]?.weight ?? lastW ?? ""),
      reps:   ls[i]?.reps ?? lastR ?? ex.dr,
      done:false,
      prevW: ls[i]?.weight ?? lastW ?? null,
      prevR: ls[i]?.reps   ?? lastR ?? null,
    }))};
  });
  const aw={dayName,exercises,startDate:todayStr()};
  STATE.activeWorkout=aw; STATE.workoutRunning=true; STATE.tab="workout";
  saveTS(Date.now()); saveAW(aw); startTimer(); render();
}

function updSet(ei,si,field,value){
  const aw=STATE.activeWorkout; if(!aw) return;
  const ex=[...aw.exercises],sets=[...ex[ei].sets];
  const val=field==="done"?(value===true||value==="true"):value;
  sets[si]={...sets[si],[field]:val}; ex[ei]={...ex[ei],sets};
  STATE.activeWorkout={...aw,exercises:ex};
  saveAW(STATE.activeWorkout); render();
}
function updSetSilent(ei,si,field,rawVal){
  // Updates weight/reps without re-rendering (preserves iOS keyboard focus)
  const aw=STATE.activeWorkout; if(!aw) return;
  const ex=[...aw.exercises],sets=[...ex[ei].sets];
  // Accept comma as decimal separator (Turkish locale)
  const val = typeof rawVal==="string" ? rawVal.replace(",",".") : rawVal;
  sets[si]={...sets[si],[field]:val}; ex[ei]={...ex[ei],sets};
  STATE.activeWorkout={...aw,exercises:ex};
  saveAW(STATE.activeWorkout);
}
function addSet(ei){
  const aw=STATE.activeWorkout; if(!aw) return;
  const ex=[...aw.exercises],last=ex[ei].sets[ex[ei].sets.length-1];
  ex[ei]={...ex[ei],sets:[...ex[ei].sets,{setNum:ex[ei].sets.length+1,weight:last?.weight||"",reps:last?.reps||10,done:false,prevW:null,prevR:null}]};
  STATE.activeWorkout={...aw,exercises:ex}; saveAW(STATE.activeWorkout); render();
}
function delSet(ei,si){
  const aw=STATE.activeWorkout; if(!aw) return;
  if(aw.exercises[ei].sets.length<=1) return; // en az 1 set kalsın
  const ex=[...aw.exercises];
  const sets=ex[ei].sets.filter((_,i)=>i!==si).map((s,i)=>({...s,setNum:i+1}));
  ex[ei]={...ex[ei],sets};
  STATE.activeWorkout={...aw,exercises:ex}; saveAW(STATE.activeWorkout); render();
}
function removeEx(ei){
  const aw=STATE.activeWorkout; if(!aw) return;
  STATE.activeWorkout={...aw,exercises:aw.exercises.filter((_,i)=>i!==ei)};
  saveAW(STATE.activeWorkout); render();
}
function openExPicker(){ STATE.drawer={type:"exPicker",mode:"list",customName:"",customMuscle:"Custom"}; render(); }
function addExercise(exId){
  let ex=ALL_EX.find(e=>e.id===exId);
  if(!ex){
    const ce=STATE.customExercises.find(e=>e.__id===exId);
    if(ce) ex={id:ce.__id,name:ce.name,muscle:ce.muscle||"Custom",ds:ce.ds||3,dr:ce.dr||10};
  }
  if(!ex||!STATE.activeWorkout) return;
  // Auto-fill from last workout
  const last=[...STATE.workoutHistory].reverse().find(h=>h.day===STATE.activeWorkout.dayName);
  const ls=last?(last.sets||[]).filter(s=>s.exId===ex.id):[];
  const lastW=ls.length>0?ls[ls.length-1].weight:null;
  const lastR=ls.length>0?ls[ls.length-1].reps:null;
  const sets=Array.from({length:ex.ds||3},(_,i)=>({
    setNum:i+1,
    weight:String(ls[i]?.weight??lastW??""),
    reps:ls[i]?.reps??lastR??ex.dr??10,
    done:false,
    prevW:ls[i]?.weight??lastW??null,
    prevR:ls[i]?.reps??lastR??null,
  }));
  STATE.activeWorkout={...STATE.activeWorkout,exercises:[...STATE.activeWorkout.exercises,{...ex,sets}]};
  saveAW(STATE.activeWorkout); STATE.drawer=null; render();
}
async function addCustomEx(){
  const d=STATE.drawer; if(!d||!d.customName?.trim()||!STATE.activeWorkout) return;
  const exData={name:d.customName.trim(),muscle:d.customMuscle||"Custom",ds:3,dr:10};
  // Save to Firebase so it persists
  try{
    const ref = await _db.collection("users").doc(currentUser).collection("custom_exercises").add(exData);
    const saved={__id:ref.id,...exData};
    STATE.customExercises=[...STATE.customExercises, saved];
    const ex={id:ref.id,...exData};
    STATE.activeWorkout={...STATE.activeWorkout,exercises:[...STATE.activeWorkout.exercises,{...ex,sets:[{setNum:1,weight:"",reps:ex.dr,done:false,prevW:null,prevR:null}]}]};
  }catch(e){
    // fallback if offline
    const ex={id:"c"+Date.now(),...exData};
    STATE.activeWorkout={...STATE.activeWorkout,exercises:[...STATE.activeWorkout.exercises,{...ex,sets:[{setNum:1,weight:"",reps:ex.dr,done:false,prevW:null,prevR:null}]}]};
  }
  saveAW(STATE.activeWorkout); STATE.drawer=null; render();
}

function renderDrawerOnly(){
  const dc=document.getElementById("drawer-container"); if(!dc) return;
  const focused=document.activeElement;
  const fid=focused?focused.id:null;
  const ss=focused&&focused.tagName==="INPUT"?focused.selectionStart:null;
  const se=focused&&focused.tagName==="INPUT"?focused.selectionEnd:null;
  dc.innerHTML=renderDrawer();
  if(fid){const el=document.getElementById(fid);if(el){el.focus();if(ss!==null)try{el.setSelectionRange(ss,se);}catch(e){}}}
  else{const si=document.getElementById("drawer-search");if(si){const l=si.value.length;si.focus();try{si.setSelectionRange(l,l);}catch(e){}}}
}
function updateSearch(val){ STATE.drawer={...STATE.drawer,q:val}; renderDrawerOnly(); }
function updateDrawerField(field,val){ STATE.drawer={...STATE.drawer,[field]:val}; renderDrawerOnly(); }
function setDD(patch){ STATE.drawer={...STATE.drawer,...patch}; renderDrawerOnly(); }
function closeDrawer(){ STATE.drawer=null; render(); }

async function finishWorkout(){
  const aw=STATE.activeWorkout; if(!aw) return;
  const allSets=[];
  aw.exercises.forEach(ex=>ex.sets.filter(s=>s.done).forEach(s=>allSets.push({exId:ex.id,weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0})));
  const entry={day:aw.dayName,date:aw.startDate,duration:Math.round(STATE.elapsed/60),sets:allSets};
  stopTimer(); saveAW(null); saveTS(null);
  STATE.activeWorkout=null; STATE.workoutRunning=false; STATE.tab="history";
  render(); await saveWorkoutDB(entry);
}
function discardWorkout(){
  stopTimer(); saveAW(null); saveTS(null);
  STATE.activeWorkout=null; STATE.workoutRunning=false; STATE.tab="dashboard"; render();
}

function openFoodPicker(mealType){ STATE.drawer={type:"foodPicker",mealType,q:"",cat:"Hepsi",pending:null,grams:"100"}; render(); }
function selectFood(foodId){
  let food = FOOD_DB.find(f=>f.id===foodId);
  if(!food){
    const cf = STATE.customFoods.find(f=>f.__id===foodId);
    if(cf) food = {id:cf.__id, name:cf.name, cat:cf.cat||"Özel", p:{kcal:cf.kcal,protein:cf.protein,carb:cf.carb,fat:cf.fat}};
  }
  if(!food) return;
  STATE.drawer={...STATE.drawer,pending:food,grams:"100"}; renderDrawerOnly();
}

async function addCustomFood(mealType){
  const d = STATE.drawer;
  if(!d || !d.cf_name?.trim()) { showToast("⚠️ Besin adı gerekli!"); return; }
  const food = {
    name: d.cf_name.trim(),
    cat: d.cf_cat || "Özel",
    kcal: parseFloat(d.cf_kcal)||0,
    protein: parseFloat(d.cf_protein)||0,
    carb: parseFloat(d.cf_carb)||0,
    fat: parseFloat(d.cf_fat)||0,
  };
  const saved = await saveCustomFoodDB(food);
  if(!saved) return;
  const date = todayStr();
  const emptyM = {"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM = STATE.nutritionLog[date] || emptyM;
  const updated = {...dayM,[mealType]:[...(dayM[mealType]||[]),{id:saved.__id, g:parseFloat(d.grams)||100}]};
  STATE.drawer = null;
  await saveNutritionDB(date, updated);
}

async function confirmFood(){
  const d=STATE.drawer; if(!d||!d.pending) return;
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM=STATE.nutritionLog[date]||emptyM;
  const finalGrams = d.useUnit && d.pending.unit_g ? Math.round((parseFloat(String(d.grams).replace(",","."))||1)*d.pending.unit_g) : parseFloat(String(d.grams).replace(",","."))||100;
  const updated={...dayM,[d.mealType]:[...(dayM[d.mealType]||[]),{id:d.pending.id,g:finalGrams}]};
  STATE.drawer=null; await saveNutritionDB(date,updated);
}

async function removeFoodItem(mealType,idx){
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM=STATE.nutritionLog[date]||emptyM;
  const updated={...dayM,[mealType]:dayM[mealType].filter((_,i)=>i!==idx)};
  await saveNutritionDB(date,updated);
}
async function loadSugg(mealType,idx){
  const sugg=MEAL_SUGG[mealType]?.[idx]; if(!sugg) return;
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  let dayM={...(STATE.nutritionLog[date]||emptyM)};
  sugg.items.forEach(it=>dayM={...dayM,[mealType]:[...(dayM[mealType]||[]),{id:it.id,g:it.g}]});
  await saveNutritionDB(date,dayM);
}

// BOOT
render();
if(authed && currentUser){
  try{
    initFirebase();
    loadData();
  }catch(e){
    console.error("Firebase init error:",e);
    STATE.loading=false; render();
  }
}
