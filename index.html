<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080B10;color:#E8ECF0;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;-webkit-font-smoothing:antialiased}
#root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#00BFFF44;border-radius:2px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,select,button{font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif}
button{cursor:pointer}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.glow{text-shadow:0 0 12px #00BFFF88}
.tab-line{position:absolute;top:0;left:15%;right:15%;height:2px;background:#00BFFF;border-radius:0 0 2px 2px}
.sr-input{background:#1A1F28;border:1px solid #2A3040;color:#E8ECF0;border-radius:4px;padding:6px 4px;text-align:center;font-size:15px;font-weight:700;width:100%;outline:none}
.sr-input:focus{border-color:#00BFFF}
.sr-done .sr-input{background:#0A2010;border-color:#39FF1440;color:#39FF14}
.fi{background:#1A1F28;border:1px solid #2A3040;color:#E8ECF0;border-radius:6px;padding:9px 11px;font-size:14px;font-weight:600;outline:none;width:100%}
.fi:focus{border-color:#00BFFF}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0D1117;border:1px solid #1E2530;border-radius:14px 14px 0 0;padding:14px;z-index:300;max-height:78vh;overflow-y:auto}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1A2530;border:1px solid #00BFFF40;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;color:#00BFFF;z-index:999;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

async function loadData(){
  try{
    const [wSnap,nSnap] = await Promise.all([
      _db.collection("workouts").orderBy("date","desc").get(),
      _db.collection("nutrition_logs").get()
    ]);
    STATE.workoutHistory = wSnap.docs.map(d=>({__id:d.id,...d.data(),sets:d.data().sets||[]}));
    const log={};
    nSnap.docs.forEach(d=>{ log[d.id]=d.data().meals||{}; });
    STATE.nutritionLog = log;
    STATE.loading = false;
    const savedAW = loadAW();
    if(savedAW){
      STATE.activeWorkout=savedAW; STATE.workoutRunning=true;
      STATE.elapsed=elapsedFromTS(); STATE.tab="workout";
      startTimer();
    }
    render();
  }catch(e){
    console.error("loadData error:",e);
    STATE.loading=false; render();
  }
}

// HELPERS

function todayStr(){
  return new Date().toLocaleDateString("tr-TR",{timeZone:"Europe/Istanbul",year:"numeric",month:"2-digit",day:"2-digit"}).split(".").reverse().join("-");
}
function fmtDate(s){ return new Date(s+"T12:00:00").toLocaleDateString("tr-TR",{month:"short",day:"numeric"}); }
function fmtDur(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function calcN(id,g){
  const f=FOOD_DB.find(x=>x.id===id); if(!f) return{kcal:0,protein:0,carb:0,fat:0};
  const r=g/100;
  return{kcal:Math.round(f.p.kcal*r),protein:Math.round(f.p.protein*r*10)/10,carb:Math.round(f.p.carb*r*10)/10,fat:Math.round(f.p.fat*r*10)/10};
}
function getPRs(history){
  const prs={};
  history.forEach(s=>(s.sets||[]).forEach(set=>{
    const v=set.weight*set.reps;
    if(!prs[set.exId]||v>prs[set.exId].vol) prs[set.exId]={weight:set.weight,reps:set.reps,vol:v,date:s.date};
  }));
  return prs;
}
function getStreak(history){
  if(!history.length) return 0;
  const sorted=[...history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let streak=0; const chk=new Date();
  for(let i=0;i<60;i++){
    const ds=chk.toISOString().split("T")[0];
    if(sorted.find(h=>h.date===ds)) streak++; else if(i>0) break;
    chk.setDate(chk.getDate()-1);
  }
  return streak;
}
function getTrend(history,exId){
  const pts=[];
  history.forEach(s=>{
    const best=(s.sets||[]).filter(x=>x.exId===exId).reduce((a,b)=>(!a||b.weight>a.weight)?b:a,null);
    if(best) pts.push({date:s.date,weight:best.weight});
  });
  return pts;
}
function getWeekVol(history){
  const now=new Date(),ws=new Date(now); ws.setDate(now.getDate()-6);
  const vol={};
  history.filter(h=>new Date(h.date)>=ws).forEach(s=>{
    (s.sets||[]).forEach(set=>{
      const ex=ALL_EX.find(e=>e.id===set.exId);
      if(ex) vol[ex.muscle]=(vol[ex.muscle]||0)+set.weight*set.reps;
    });
  });
  return vol;
}
function pill(text,color){ return`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;background:${color}18;color:${color};border:1px solid ${color}30;display:inline-flex;align-items:center;gap:3px">${text}</span>`; }
function donutSVG(eaten,target){
  const pct=Math.min(eaten/(target||1),1),r=44,circ=2*Math.PI*r,dash=pct*circ;
  return`<svg viewBox="0 0 100 100" width="90" height="90"><circle cx="50" cy="50" r="${r}" fill="none" stroke="#1A2530" stroke-width="10"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="#00BFFF" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 50 50)"/><text x="50" y="46" text-anchor="middle" fill="#E8ECF0" font-size="13" font-weight="bold" font-family="Barlow Condensed,sans-serif">${eaten}</text><text x="50" y="58" text-anchor="middle" fill="#7A8898" font-size="8" font-family="Barlow Condensed,sans-serif">/ ${target}</text></svg>`;
}
function sparklineSVG(data,color,w,h){
  if(!data||data.length<2) return`<span style="color:#555;font-size:11px">Yetersiz veri</span>`;
  const ws=data.map(d=>d.weight),mn=Math.min(...ws),mx=Math.max(...ws),rng=mx-mn||1;
  const pts=data.map((d,i)=>{const x=(i/(data.length-1))*w,y=h-((d.weight-mn)/rng)*(h-6)-3;return x+","+y;}).join(" ");
  const lx=w,ly=h-((data[data.length-1].weight-mn)/rng)*(h-6)-3;
  return`<svg width="${w}" height="${h}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lx}" cy="${ly}" r="3" fill="${color}"/></svg>`;
}
function showToast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

function renderProgress(){

  });
  html+=`</div><div style="font-size:12px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Egzersiz Trendleri</div>`;
  ALL_EX.forEach(ex=>{

      <span style="font-size:8px;color:${mc};font-weight:700;background:${mc}20;padding:1px 6px;border-radius:3px;text-transform:uppercase">${ex.muscle}</span>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">${sparklineSVG(trend,mc,110,34)}<div style="font-size:9px;color:#556070">${fmtDate(trend[0].date)} → ${fmtDate(trend[trend.length-1].date)}</div></div>

  return html+`</div>`;

function renderNutrition(){
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM=STATE.nutritionLog[date]||emptyM;
  function totals(m){let k=0,p=0,c=0,f=0;Object.values(m).forEach(items=>items.forEach(it=>{const n=calcN(it.id,it.g);k+=n.kcal;p+=n.protein;c+=n.carb;f+=n.fat;}));return{kcal:Math.round(k),protein:Math.round(p*10)/10,carb:Math.round(c*10)/10,fat:Math.round(f*10)/10};}
  function mTotals(items){let k=0,p=0;items.forEach(it=>{const n=calcN(it.id,it.g);k+=n.kcal;p+=n.protein;});return{kcal:Math.round(k),protein:Math.round(p*10)/10};}
  const T=totals(dayM);
  const MC2={"Kahvaltı":"#FFD700","Ara Öğün":"#FF6B35","Akşam Yemeği":"#00BFFF"};
  const MI={"Kahvaltı":"🌅","Ara Öğün":"🥜","Akşam Yemeği":"🍽️"};
  let html=`<div style="padding:16px;padding-bottom:100px">
  <h1 style="font-size:26px;font-weight:900;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase"><span style="color:#00BFFF">Beslenme</span> Takibi</h1>
  <div style="font-size:11px;color:#7A8898;margin-bottom:12px">${date} · Hedef: ${TARGETS.kcal} kcal / ${TARGETS.protein}g protein</div>
  <div style="background:#0D1117;border:1px solid #1E2530;border-radius:14px;padding:14px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:14px">
      ${donutSVG(T.kcal,TARGETS.kcal)}
      <div style="flex:1">
        <div style="font-size:11px;font-weight:700;color:#7A8898;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Bugün</div>
        ${[{l:"Protein",v:T.protein,t:TARGETS.protein,c:"#FF6B6B"},{l:"Karb",v:T.carb,t:TARGETS.carb,c:"#BB86FC"},{l:"Yağ",v:T.fat,t:TARGETS.fat,c:"#FFD700"}].map(m=>{
          const p=Math.min((m.v/m.t)*100,100);
          return`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:11px;font-weight:700;color:${m.c}">${m.l}</span><span style="font-size:11px;color:#7A8898">${m.v}/${m.t}g</span></div><div style="height:5px;background:#1A2530;border-radius:3px;overflow:hidden"><div style="height:100%;width:${p}%;background:${m.c};border-radius:3px"></div></div></div>`;
        }).join("")}
      </div>
    </div>
  </div>
  <div style="background:#0A1520;border:1px solid #00BFFF18;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:11px;color:#7A8898;line-height:1.7">
    <span style="color:#00BFFF;font-weight:700">📌 Hedefler:</span> ${TARGETS.kcal} kcal · ${TARGETS.protein}g P · ${TARGETS.carb}g K · ${TARGETS.fat}g Y<br>
    <span style="font-size:10px">Kahvaltı ~600 / Ara ~300 / Akşam ~1200 kcal</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <div style="font-size:11px;font-weight:700;color:#7A8898;letter-spacing:2px;text-transform:uppercase">Plan Önerileri</div>
    <button onclick="toggleSec('sugg')" style="background:none;border:none;color:#00BFFF;font-size:11px;font-weight:700">Göster/Gizle</button>
  </div>
  <div id="sugg-body">`;
  Object.entries(MEAL_SUGG).forEach(([mt,suggs])=>{
    const mc=MC2[mt];
    html+=`<div style="background:#0D1117;border:1px solid ${mc}25;border-radius:10px;padding:9px 12px;margin-bottom:7px">
      <div style="font-size:12px;font-weight:800;color:${mc};text-transform:uppercase;margin-bottom:7px">${MI[mt]} ${mt}</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">`;
    suggs.forEach((s,i)=>{
      const ns=s.items.map(it=>calcN(it.id,it.g)),sk=ns.reduce((a,b)=>a+b.kcal,0),sp=ns.reduce((a,b)=>a+b.protein,0);
      html+=`<button onclick="loadSugg('${mt}',${i})" style="background:${mc}15;border:1px solid ${mc}30;border-radius:7px;padding:7px 10px;color:#E8ECF0;text-align:left"><div style="font-size:12px;font-weight:700">${s.name}</div><div style="font-size:10px;color:#7A8898">${Math.round(sk)} kcal · ${Math.round(sp*10)/10}g P</div></button>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  Object.entries(dayM).forEach(([mt,items])=>{
    const mc=MC2[mt],mt2=mTotals(items);
    html+=`<div style="background:#0D1117;border:1px solid ${mc}30;border-radius:12px;margin-bottom:10px;overflow:hidden">
      <div style="padding:11px 13px;border-bottom:1px solid ${mc}20;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:16px;font-weight:800;text-transform:uppercase;color:${mc}">${MI[mt]} ${mt}</div>
        <div style="font-size:10px;color:#7A8898">${mt2.kcal} kcal · ${mt2.protein}g protein</div></div>
        <button onclick="openFoodPicker('${mt}')" style="background:${mc};color:#000;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:800">+ EKLE</button>
      </div>
      <div style="padding:6px 13px">`;
    if(!items.length) html+=`<div style="color:#556070;font-size:12px;padding:6px 0;text-align:center">Henüz yemek eklenmedi</div>`;
    items.forEach((item,idx)=>{
      const food=FOOD_DB.find(f=>f.id===item.id),n=calcN(item.id,item.g);
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1A2530">
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${food?.name||item.id}</div><div style="font-size:10px;color:#7A8898">${item.g}g</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:${mc}">${n.kcal} kcal</div><div style="font-size:10px;color:#7A8898">P:${n.protein} K:${n.carb} Y:${n.fat}</div></div>
          <button onclick="removeFoodItem('${mt}',${idx})" style="background:#2A1010;border:1px solid #FF444428;border-radius:5px;color:#FF6B6B;font-size:11px;padding:3px 7px;font-weight:700">✕</button>
        </div></div>`;
    });
    html+=`</div></div>`;
  });
  return html+`</div>`;
}

          <button onclick="selectFood('${food.id}')" style="background:#141820;border:1px solid #2A3040;border-radius:7px;padding:9px 11px;display:flex;justify-content:space-between;align-items:center;color:#E8ECF0;width:100%">
            <div style="text-align:left"><div style="font-size:13px;font-weight:700">${food.name}</div><div style="font-size:10px;color:#7A8898">${food.cat}</div></div>
            <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#00BFFF">${food.p.kcal} kcal</div><div style="font-size:10px;color:#7A8898">P:${food.p.protein}g</div></div>
          </button>`).join("")}
        ${filtered.length>40?`<div style="color:#556070;font-size:11px;text-align:center;padding:8px">+ ${filtered.length-40} daha — aramayı daralt</div>`:""}
      </div>
    </div>`;
  }
  return "";
}

// ═══════════════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function setTab(t){ STATE.tab=t; render(); }
function toggleSec(id){
  const b=document.getElementById(id+"-body"),a=document.getElementById(id+"-arr");
  if(!b) return; const open=b.style.display==="none";
  b.style.display=open?"block":"none"; if(a) a.textContent=open?"▲":"▼";
}

function startWorkout(dayName){
  const plan=WORKOUT_PLAN[dayName];
  const last=[...STATE.workoutHistory].reverse().find(h=>h.day===dayName);
  const exercises=plan.exercises.map(ex=>{
    const ls=last?(last.sets||[]).filter(s=>s.exId===ex.id):[];
    return{...ex,sets:Array.from({length:ex.ds},(_,i)=>({setNum:i+1,weight:ls[i]?.weight||"",reps:ls[i]?.reps||ex.dr,done:false,prevW:ls[i]?.weight||null,prevR:ls[i]?.reps||null}))};
  });
  const aw={dayName,exercises,startDate:todayStr()};
  STATE.activeWorkout=aw; STATE.workoutRunning=true; STATE.tab="workout";
  saveTS(Date.now()); saveAW(aw); startTimer(); render();
}

function updSet(ei,si,field,value){
  const aw=STATE.activeWorkout; if(!aw) return;
  const ex=[...aw.exercises],sets=[...ex[ei].sets];
  const val=field==="done"?(value===true||value==="true"):value;
  sets[si]={...sets[si],[field]:val}; ex[ei]={...ex[ei],sets};
  STATE.activeWorkout={...aw,exercises:ex};
  saveAW(STATE.activeWorkout); render();
}
function addSet(ei){
  const aw=STATE.activeWorkout; if(!aw) return;
  const ex=[...aw.exercises],last=ex[ei].sets[ex[ei].sets.length-1];
  ex[ei]={...ex[ei],sets:[...ex[ei].sets,{setNum:ex[ei].sets.length+1,weight:last?.weight||"",reps:last?.reps||10,done:false,prevW:null,prevR:null}]};
  STATE.activeWorkout={...aw,exercises:ex}; saveAW(STATE.activeWorkout); render();
}
function removeEx(ei){
  const aw=STATE.activeWorkout; if(!aw) return;
  STATE.activeWorkout={...aw,exercises:aw.exercises.filter((_,i)=>i!==ei)};
  saveAW(STATE.activeWorkout); render();
}
function openExPicker(){ STATE.drawer={type:"exPicker",mode:"list",customName:"",customMuscle:"Custom"}; render(); }
function addExercise(exId){
  const ex=ALL_EX.find(e=>e.id===exId); if(!ex||!STATE.activeWorkout) return;
  STATE.activeWorkout={...STATE.activeWorkout,exercises:[...STATE.activeWorkout.exercises,{...ex,sets:[{setNum:1,weight:"",reps:ex.dr,done:false,prevW:null,prevR:null}]}]};
  saveAW(STATE.activeWorkout); STATE.drawer=null; render();
}
function addCustomEx(){
  const d=STATE.drawer; if(!d||!d.customName?.trim()||!STATE.activeWorkout) return;
  const ex={id:"c"+Date.now(),name:d.customName.trim(),muscle:d.customMuscle||"Custom",ds:3,dr:10};
  STATE.activeWorkout={...STATE.activeWorkout,exercises:[...STATE.activeWorkout.exercises,{...ex,sets:[{setNum:1,weight:"",reps:10,done:false,prevW:null,prevR:null}]}]};
  saveAW(STATE.activeWorkout); STATE.drawer=null; render();
}

function renderDrawerOnly(){
  const dc=document.getElementById("drawer-container"); if(!dc) return;
  const focused=document.activeElement;
  const fid=focused?focused.id:null;
  const ss=focused&&focused.tagName==="INPUT"?focused.selectionStart:null;
  const se=focused&&focused.tagName==="INPUT"?focused.selectionEnd:null;
  dc.innerHTML=renderDrawer();
  if(fid){const el=document.getElementById(fid);if(el){el.focus();if(ss!==null)try{el.setSelectionRange(ss,se);}catch(e){}}}
  else{const si=document.getElementById("drawer-search");if(si){const l=si.value.length;si.focus();try{si.setSelectionRange(l,l);}catch(e){}}}
}
function updateSearch(val){ STATE.drawer={...STATE.drawer,q:val}; renderDrawerOnly(); }
function updateDrawerField(field,val){ STATE.drawer={...STATE.drawer,[field]:val}; renderDrawerOnly(); }
function setDD(patch){ STATE.drawer={...STATE.drawer,...patch}; renderDrawerOnly(); }
function closeDrawer(){ STATE.drawer=null; render(); }

async function finishWorkout(){
  const aw=STATE.activeWorkout; if(!aw) return;
  const allSets=[];
  aw.exercises.forEach(ex=>ex.sets.filter(s=>s.done).forEach(s=>allSets.push({exId:ex.id,weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0})));
  const entry={day:aw.dayName,date:aw.startDate,duration:Math.round(STATE.elapsed/60),sets:allSets};
  stopTimer(); saveAW(null); saveTS(null);
  STATE.activeWorkout=null; STATE.workoutRunning=false; STATE.tab="history";
  render(); await saveWorkoutDB(entry);
}
function discardWorkout(){
  stopTimer(); saveAW(null); saveTS(null);
  STATE.activeWorkout=null; STATE.workoutRunning=false; STATE.tab="dashboard"; render();
}

function openFoodPicker(mealType){ STATE.drawer={type:"foodPicker",mealType,q:"",cat:"Hepsi",pending:null,grams:"100"}; render(); }
function selectFood(foodId){ const food=FOOD_DB.find(f=>f.id===foodId); if(!food) return; STATE.drawer={...STATE.drawer,pending:food,grams:"100"}; renderDrawerOnly(); }

async function confirmFood(){
  const d=STATE.drawer; if(!d||!d.pending) return;
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM=STATE.nutritionLog[date]||emptyM;
  const updated={...dayM,[d.mealType]:[...(dayM[d.mealType]||[]),{id:d.pending.id,g:parseFloat(d.grams)||100}]};
  STATE.drawer=null; await saveNutritionDB(date,updated);
}

async function removeFoodItem(mealType,idx){
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  const dayM=STATE.nutritionLog[date]||emptyM;
  const updated={...dayM,[mealType]:dayM[mealType].filter((_,i)=>i!==idx)};
  await saveNutritionDB(date,updated);
}
async function loadSugg(mealType,idx){
  const sugg=MEAL_SUGG[mealType]?.[idx]; if(!sugg) return;
  const date=todayStr();
  const emptyM={"Kahvaltı":[],"Ara Öğün":[],"Akşam Yemeği":[]};
  let dayM={...(STATE.nutritionLog[date]||emptyM)};
  sugg.items.forEach(it=>dayM={...dayM,[mealType]:[...(dayM[mealType]||[]),{id:it.id,g:it.g}]});
  await saveNutritionDB(date,dayM);
}

// BOOT
render();
if(authed){
  try{
    initFirebase();
    loadData();
  }catch(e){
    console.error("Firebase init error:",e);
    STATE.loading=false; render();
  }
}
</script>
</body>
